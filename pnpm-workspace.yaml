packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@0.1.24
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.24
  vite-plus: 0.1.24
  react: ^19.2.7
  react-dom: ^19.2.7
  "@dnd-kit/react": ^0.5.0
  "@dnd-kit/dom": ^0.5.0
  "@dnd-kit/abstract": ^0.5.0
  lucide-react: ^1.18.0
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  "@tsdown/css": 0.22.1
  "@playwright/test": ^1.60.0
  zustand: ^5.0.14
  zod: ^4.4.3
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
