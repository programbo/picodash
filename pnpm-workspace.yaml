packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
  react: ^19.2.7
  react-dom: ^19.2.7
  "@dnd-kit/react": ^0.5.0
  "@dnd-kit/dom": ^0.5.0
  "@dnd-kit/abstract": ^0.5.0
  lucide-react: ^1.18.0
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  "@tsdown/css": ^0.22.2
  "@playwright/test": ^1.60.0
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
