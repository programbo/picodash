name: Bug report
description: Report a reproducible problem with Picodash
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please search existing issues first.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Which package version or commit are you using?
      placeholder: 0.1.0 or abc1234
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Describe the smallest reproduction, including relevant code or a link. Redact tokens, credentials, private URLs, and customer data before submitting.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include browser, OS, React, Bun/Node, and relevant dependency versions. Redact tokens, credentials, private URLs, and customer data before submitting.
    validations:
      required: true
